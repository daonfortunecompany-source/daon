<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>리포트 생성 상태 | 다온사주</title>
  <style>
    :root {
      --bg: #f8f5f0;
      --card: #fffdf9;
      --line: #eadfd2;
      --text: #352c29;
      --muted: #6f625b;
      --primary: #cf8f7a;
      --primary-soft: #fff5f0;
      --good: #7db4a5;
      --shadow: 0 20px 40px rgba(95, 72, 56, .08);
      --radius: 26px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f7f3ee 0%, #fdfaf6 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      padding: 18px;
    }
    .card {
      width: min(100%, 430px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
    }
    h1, h2, p { margin: 0; }
    h1 { font-size: 26px; letter-spacing: -.04em; }
    .sub { margin-top: 10px; color: var(--muted); line-height: 1.7; font-size: 14px; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      border: 1px solid #f0ddd1;
      color: #8b5d53;
      font-weight: 800;
      font-size: 13px;
    }

    .loading-panel {
      margin-top: 18px;
      border: 1px solid #f0e2d6;
      border-radius: 22px;
      background: linear-gradient(180deg, #fffaf6 0%, #fff 100%);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 58px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid #f1ded5;
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
      flex: 0 0 auto;
    }

    .loading-copy {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 800;
      color: #6d5247;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .loading-copy .base {
      animation: breathe 1.6s ease-in-out infinite;
    }

    .loading-dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 24px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      opacity: .3;
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: .18s; }
    .loading-dots span:nth-child(3) { animation-delay: .36s; }

    .progress-shell {
      display: grid;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #f2e8df;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #e3a694 0%, #cf8f7a 45%, #b97669 100%);
      transition: width .45s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.8s linear infinite;
    }

    .timeline {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px 14px;
      position: relative;
      overflow: hidden;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .timeline-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(207,143,122,.08), rgba(255,255,255,0));
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
    }

    .timeline-item strong { display: block; font-size: 14px; margin-bottom: 6px; }
    .timeline-item span { color: var(--muted); font-size: 13px; line-height: 1.65; display: block; }

    .step-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .02em;
      color: #927160;
      text-transform: uppercase;
    }

    .step-kicker i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d8c8bc;
      display: inline-block;
      flex: 0 0 auto;
    }

    .timeline-item.active {
      border-color: #e1b8a9;
      background: linear-gradient(180deg, #fff8f3 0%, #fff 100%);
      box-shadow: 0 14px 28px rgba(207, 143, 122, .14);
      transform: translateY(-1px);
    }

    .timeline-item.active::after {
      opacity: 1;
      animation: stepGlow 1.6s ease-in-out infinite;
    }

    .timeline-item.active .step-kicker i {
      background: var(--primary);
      box-shadow: 0 0 0 6px rgba(207,143,122,.12);
      animation: pulseDot 1.3s ease-in-out infinite;
    }

    .timeline-item.done {
      border-color: #d5e8e1;
      background: linear-gradient(180deg, #f6fbf9 0%, #fff 100%);
    }

    .timeline-item.done .step-kicker {
      color: #538170;
    }

    .timeline-item.done .step-kicker i {
      background: var(--good);
      box-shadow: 0 0 0 6px rgba(125,180,165,.12);
    }

    .timeline-item.pending .step-kicker i {
      background: #d8c8bc;
      box-shadow: none;
    }

    .detail {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: #f8f3ee;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
      white-space: pre-line;
    }

    [hidden] { display: none !important; }

    .meta-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fffaf6;
      display: grid;
      gap: 8px;
    }

    .meta-box strong { font-size: 13px; }
    .meta-box code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: rgba(255,255,255,.8);
      padding: 2px 6px;
      border-radius: 8px;
      color: #6d5247;
    }

    .lookup-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .actions {
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      min-height: 52px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #e2a38e);
      color: white;
      box-shadow: 0 12px 24px rgba(207,143,122,.22);
    }

    .btn-soft {
      background: rgba(255,255,255,.86);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .is-final .spinner,
    .is-final .loading-dots,
    .is-final .progress-bar::after {
      animation: none;
    }

    .is-final .spinner {
      border-color: #d7ebe4;
      border-top-color: var(--good);
    }

    .is-failed .loading-copy,
    .is-failed .status-badge {
      color: #9a4b43;
    }

    .report-view {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .report-notice {
      background: #fff7f1;
      border: 1px solid #f0ddd1;
      border-radius: 18px;
      padding: 16px;
      color: #6f5b50;
      line-height: 1.7;
      font-size: 14px;
    }

    .report-card {
      background: #fffdfa;
      border: 1px solid #eadfd2;
      border-radius: 20px;
      padding: 18px 16px;
      box-shadow: 0 8px 26px rgba(53, 44, 41, 0.06);
    }

    .report-card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
      color: #352c29;
    }

    .report-card p {
      margin: 0 0 12px;
      line-height: 1.9;
      font-size: 15px;
      color: #4d4340;
      word-break: keep-all;
    }

    .report-copy-wrap {
      position: sticky;
      bottom: 12px;
      z-index: 2;
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .copy-feedback {
      font-size: 13px;
      color: #6f625b;
      text-align: center;
      min-height: 20px;
    }

    .copy-toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%) translateY(12px);
      width: min(calc(100% - 32px), 380px);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(53, 44, 41, 0.92);
      color: #fff;
      font-size: 13px;
      line-height: 1.6;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      box-shadow: 0 16px 32px rgba(53, 44, 41, 0.18);
      z-index: 30;
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .copy-toast.error {
      background: rgba(154, 75, 67, 0.95);
    }

    .report-copy-btn {
      width: 100%;
      padding: 16px 18px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #cf8f7a, #b87562);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(207, 143, 122, 0.28);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: translateY(0); opacity: .25; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes breathe {
      0%, 100% { opacity: .72; }
      50% { opacity: 1; }
    }
    @keyframes shimmer {
      to { transform: translateX(100%); }
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes stepGlow {
      0%, 100% { opacity: .45; }
      50% { opacity: .9; }
    }

    @media (max-width: 420px) {
      .card {
        padding: 22px 16px;
      }
      h1 { font-size: 24px; }
      .loading-row {
        gap: 10px;
        min-height: 54px;
      }
      .loading-copy {
        font-size: 14px;
      }
      .report-card {
        padding: 16px 14px;
      }
      .report-card h2 {
        font-size: 17px;
      }
      .report-card p {
        font-size: 14px;
        line-height: 1.85;
      }
    }
  </style>
</head>
<body>
  <main class="card" id="statusCard">
    <h1>리포트 제작 상태</h1>
    <p class="sub">리포트 생성 중입니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요. 생성 완료 후 리포트가 현재 화면에 표시됩니다.</p>
    <div class="status-badge" id="statusBadge">상태 확인 중...</div>

    <section class="meta-box" id="receiptMetaBox" hidden></section>

    <section class="loading-panel" id="loadingPanel" aria-label="리포트 생성 진행 상태">
      <div class="loading-row">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-copy" aria-live="polite">
          <span class="base" id="loadingText">리포트 생성 중</span>
          <span class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </div>
      </div>
      <div class="progress-shell">
        <div class="progress-meta">
          <span id="progressLabel">진행 상태를 확인하고 있습니다.</span>
          <span id="progressValue">0%</span>
        </div>
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </section>

    <section class="timeline" id="timelinePanel">
      <article class="timeline-item pending" id="stepPayment">
        <div class="step-kicker"><i></i><span>Step 1</span></div>
        <strong>1. 결제 확인</strong>
        <span id="paymentStep">결제 승인 여부를 확인하고 있습니다.</span>
      </article>
      <article class="timeline-item pending" id="stepGenerating">
        <div class="step-kicker"><i></i><span>Step 2</span></div>
        <strong>2. 리포트 생성</strong>
        <span id="generationStep">사주 원국과 해석을 정리하고 있습니다.</span>
      </article>
      <article class="timeline-item pending" id="stepDownload">
        <div class="step-kicker"><i></i><span>Step 3</span></div>
        <strong>3. 리포트 화면 표시</strong>
        <span id="downloadStep">완료 후 모바일 리포트를 현재 화면에서 확인할 수 있습니다.</span>
      </article>
    </section>

    <div class="detail" id="detailBox">주문 정보를 불러오는 중입니다.</div>

    <div class="actions" id="actions">
      <button class="btn btn-primary" id="refreshButton" type="button">다시 확인하기</button>
      <a class="btn btn-soft" href="/">메인으로 돌아가기</a>
    </div>

    <section class="report-view" id="reportView" hidden></section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const initialOrderId = params.get('orderId') || params.get('order');
    let activeOrderId = initialOrderId;
    const pageTitle = document.querySelector('h1');
    const statusCard = document.getElementById('statusCard');
    const statusSub = document.querySelector('.sub');
    const statusBadge = document.getElementById('statusBadge');
    const refreshButton = document.getElementById('refreshButton');
    const paymentStep = document.getElementById('paymentStep');
    const generationStep = document.getElementById('generationStep');
    const downloadStep = document.getElementById('downloadStep');
    const detailBox = document.getElementById('detailBox');
    const actions = document.getElementById('actions');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const progressValue = document.getElementById('progressValue');
    const loadingText = document.getElementById('loadingText');
    const stepPayment = document.getElementById('stepPayment');
    const stepGenerating = document.getElementById('stepGenerating');
    const stepDownload = document.getElementById('stepDownload');
    const receiptMetaBox = document.getElementById('receiptMetaBox');
    const loadingPanel = document.getElementById('loadingPanel');
    const timelinePanel = document.getElementById('timelinePanel');
    const reportView = document.getElementById('reportView');
    const REPORT_SECTION_ORDER = ['핵심 요약','사주 원국 해석','대운','세운','월운','운성','신살,귀인','십성','재물운','직업운','애정운','자녀운','건강운','실천 조언','주의할 점','고민에 대한 조언','관계/궁합 해석'];
    const REPORT_CACHE_PREFIX = 'daon-runtime-report:';
    let pollTimer = null;
    let pollingStopped = false;
    let requestInFlight = false;
    let completedReportState = null;
    let renderedCompletedOrderId = null;

    function cloneJson(value) {
      return value ? JSON.parse(JSON.stringify(value)) : null;
    }

    function getReportCacheKey(orderId) {
      return `${REPORT_CACHE_PREFIX}${orderId || ''}`;
    }

    function saveCompletedReport(orderId, sections) {
      if (!orderId || !sections) return null;
      const cloned = cloneJson(sections);
      completedReportState = { orderId, sections: cloned };
      try {
        sessionStorage.setItem(getReportCacheKey(orderId), JSON.stringify(cloned));
      } catch (error) {
      }
      return cloned;
    }

    function loadCompletedReport(orderId) {
      if (!orderId) return null;
      if (completedReportState?.orderId === orderId && completedReportState.sections) {
        return cloneJson(completedReportState.sections);
      }
      try {
        const raw = sessionStorage.getItem(getReportCacheKey(orderId));
        const parsed = raw ? JSON.parse(raw) : null;
        if (parsed) completedReportState = { orderId, sections: parsed };
        return parsed;
      } catch (error) {
        return null;
      }
    }

    function stopPolling() {
      pollingStopped = true;
      if (pollTimer) {
        window.clearTimeout(pollTimer);
        pollTimer = null;
      }
    }

    function schedulePoll(delayMs) {
      if (pollingStopped) return;
      if (pollTimer) window.clearTimeout(pollTimer);
      pollTimer = window.setTimeout(() => {
        pollTimer = null;
        poll();
      }, delayMs);
    }

    function setStepState(target, state) {
      if (!target) return;
      target.classList.remove('pending', 'active', 'done');
      target.classList.add(state);
    }

    function applyProgress(percent, label) {
      const safe = Math.max(0, Math.min(100, Number(percent) || 0));
      progressBar.style.width = `${safe}%`;
      progressValue.textContent = `${safe}%`;
      progressLabel.textContent = label;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderReceiptMeta(data) {
      if (!receiptMetaBox) return;
      const expected = data.productType === 'compatibility' ? '2인 궁합 리포트는 분석 내용이 많아 몇 분 정도 소요될 수 있습니다.' : '1인 리포트는 보통 약 3~7분 정도 소요됩니다.';
      receiptMetaBox.hidden = false;
      receiptMetaBox.innerHTML = [
        '<strong>리포트 접수 정보</strong>',
        `<div>예상 안내: ${expected}</div>`
      ].join('');
    }

    function buildReportText(data) {
      const sections = data.reportSections || {};
      const blocks = [
        '프리미엄 사주 리포트',
        ''
      ];
      REPORT_SECTION_ORDER.forEach((title) => {
        const body = String(sections[title] || '').trim();
        if (!body) return;
        blocks.push(title, body, '');
      });
      return blocks.join('\n');
    }

    async function copyReportText(text) {
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
        }
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', 'readonly');
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(textarea);
      if (!ok) throw new Error('copy_failed');
      return true;
    }

    let copyToastTimer = null;
    function showCopyToast(message, isError = false) {
      let toast = document.getElementById('copyToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'copyToast';
        toast.className = 'copy-toast';
        toast.setAttribute('role', 'status');
        toast.setAttribute('aria-live', 'polite');
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.toggle('error', Boolean(isError));
      toast.classList.add('show');
      if (copyToastTimer) window.clearTimeout(copyToastTimer);
      copyToastTimer = window.setTimeout(() => {
        toast.classList.remove('show');
      }, 2600);
    }

    function renderHtmlReport(data) {
      if (!reportView) return;
      const currentOrderId = data.orderId || activeOrderId || '';
      if (renderedCompletedOrderId && renderedCompletedOrderId === currentOrderId && !reportView.hidden) return;
      const sections = data.reportSections || {};
      const cards = REPORT_SECTION_ORDER
        .filter((title) => String(sections[title] || '').trim())
        .map((title) => {
          const paragraphs = String(sections[title] || '')
            .split(/\n{2,}/)
            .map((item) => item.trim())
            .filter(Boolean)
            .map((item) => `<p>${escapeHtml(item)}</p>`)
            .join('');
          return `<article class="report-card"><h2>${escapeHtml(title)}</h2>${paragraphs}</article>`;
        })
        .join('');
      reportView.hidden = false;
      loadingPanel.hidden = true;
      timelinePanel.hidden = true;
      actions.hidden = true;
      detailBox.hidden = true;
      if (pageTitle) pageTitle.textContent = '프리미엄 사주 리포트';
      document.title = '프리미엄 사주 리포트 | 다온사주';
      if (statusSub) {
        statusSub.textContent = '';
        statusSub.hidden = true;
      }
      reportView.innerHTML = `
        ${cards}
        <div class="report-copy-wrap">
          <div class="copy-feedback" id="copyFeedback">리포트 내용을 보관하려면 하단의 전체 내용 복사하기 버튼을 눌러 주세요.</div>
          <button class="report-copy-btn" id="copyReportButton" type="button">전체 내용 복사하기</button>
        </div>
      `;
      const copyButton = document.getElementById('copyReportButton');
      const copyFeedback = document.getElementById('copyFeedback');
      const reportText = buildReportText(data);
      renderedCompletedOrderId = currentOrderId;
      copyButton?.addEventListener('click', async () => {
        try {
          await copyReportText(reportText);
          if (copyFeedback) copyFeedback.textContent = '리포트 전체 내용이 복사되었습니다. 필요한 곳에 붙여넣어 보관해 주세요.';
          showCopyToast('리포트 전체 내용이 복사되었습니다. 필요한 곳에 붙여넣어 보관해 주세요.');
        } catch (error) {
          if (copyFeedback) copyFeedback.textContent = '자동 복사에 실패했습니다. 내용을 직접 선택해 복사해 주세요.';
          showCopyToast('자동 복사에 실패했습니다. 내용을 직접 선택해 복사해 주세요.', true);
        }
      });
    }

    function renderStatus(data) {
      const rawStatus = data.status || 'created';
      const status = rawStatus === 'ready' ? 'completed' : rawStatus;
      const currentStep = data.currentStep || null;
      const progress = Number.isFinite(Number(data.progress)) ? Number(data.progress) : null;
      if (statusSub) statusSub.hidden = false;
      const currentOrderId = data.orderId || activeOrderId || '';
      const cachedSections = data.reportSections || loadCompletedReport(currentOrderId);
      const hasRenderableSections = Boolean(cachedSections && Object.keys(cachedSections).length);
      const renderData = hasRenderableSections ? { ...data, reportSections: cachedSections } : data;
      const completedButMissingSections = status === 'completed' && renderData.viewMode === 'html' && !hasRenderableSections;
      renderReceiptMeta(renderData);
      const statusMap = {
        created: '주문 접수',
        payment_pending: '결제 대기 중',
        queued: '제작 접수 완료',
        payment_success: '제작 접수 완료',
        generating: '리포트 생성 중',
        ready: '리포트 준비 완료',
        completed: '리포트 준비 완료',
        payment_cancelled: '결제 취소',
        failed: '일시적 지연'
      };
      statusBadge.textContent = statusMap[status] || '상태 확인 중';

      const isCompleted = status === 'completed';
      const isQueued = status === 'queued' || status === 'payment_success';
      const isGenerating = isQueued || status === 'generating';
      statusCard.classList.toggle('is-final', ['completed', 'payment_cancelled', 'failed'].includes(status));
      statusCard.classList.toggle('is-failed', ['payment_cancelled', 'failed'].includes(status));
      if (statusSub) {
        statusSub.textContent = completedButMissingSections
          ? '리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.'
          : isCompleted
            ? (hasRenderableSections
                ? '리포트 생성이 완료되었습니다.'
                : '리포트 표시 중 문제가 발생했습니다. 고객센터로 문의해 주세요.')
            : status === 'failed'
              ? '리포트 생성 중 일시적인 문제가 발생했습니다. 결제는 정상 확인되었으나, 해석 생성 단계에서 문제가 발생했습니다. 잠시 후 다시 시도하거나 고객센터로 문의해 주세요.'
              : isQueued
                ? '리포트 생성이 접수되었습니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요.'
                : status === 'payment_cancelled'
                  ? '결제가 취소되어 리포트 생성이 진행되지 않았습니다.'
                  : (renderData.productType === 'compatibility'
                      ? '리포트 생성 중입니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요. 2인 궁합 리포트는 분석 내용이 많아 몇 분 정도 소요될 수 있습니다.'
                      : '리포트 생성 중입니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요. 생성 완료 후 리포트가 현재 화면에 표시됩니다.');
      }

      loadingText.textContent = completedButMissingSections
        ? '리포트 표시 오류'
        : isCompleted
          ? '리포트 준비 완료'
          : status === 'failed'
            ? '리포트 생성을 다시 확인하고 있습니다'
            : status === 'payment_cancelled'
              ? '결제가 취소되었습니다'
              : isQueued
                ? '제작 접수 완료'
                : isGenerating
                  ? '리포트 생성 중'
                  : '리포트 상태 확인 중';

      if (['queued', 'payment_success', 'generating', 'completed'].includes(status)) {
        paymentStep.textContent = status === 'queued' || status === 'payment_success'
          ? '결제가 정상 확인되어 리포트 제작이 접수되었습니다.'
          : '결제 성공이 확인되었습니다.';
        setStepState(stepPayment, 'done');
      } else if (status === 'payment_cancelled') {
        paymentStep.textContent = '결제가 취소되어 리포트 제작이 진행되지 않았습니다.';
        setStepState(stepPayment, 'pending');
      } else {
        paymentStep.textContent = '결제 승인 여부를 확인하고 있습니다.';
        setStepState(stepPayment, status === 'payment_pending' ? 'active' : 'pending');
      }

      if (status === 'queued' || status === 'payment_success' || status === 'generating') {
        generationStep.textContent = '사주 계산과 해석 문장을 정리하고 있습니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요.';
        downloadStep.textContent = '완료 후 모바일 리포트를 현재 화면에서 확인할 수 있습니다.';
        setStepState(stepGenerating, 'active');
        setStepState(stepDownload, 'pending');
      } else if (completedButMissingSections) {
        generationStep.textContent = '리포트 생성은 완료되었지만 화면 표시 중 문제가 발생했습니다.';
        downloadStep.textContent = '리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.';
        setStepState(stepGenerating, 'done');
        setStepState(stepDownload, 'pending');
      } else if (isCompleted) {
        generationStep.textContent = hasRenderableSections ? '리포트 생성이 완료되었습니다.' : '리포트 생성은 완료되었지만 화면 표시를 다시 확인해 주세요.';
        downloadStep.textContent = hasRenderableSections ? '전체 내용 복사하기 버튼으로 내용을 보관할 수 있습니다.' : '리포트 표시를 다시 확인해 주세요.';
        setStepState(stepGenerating, 'done');
        setStepState(stepDownload, 'done');
      } else if (status === 'failed') {
        generationStep.textContent = '리포트 생성 중 일시적인 문제가 발생했습니다. 잠시 후 다시 시도해 주세요.';
        downloadStep.textContent = '잠시 후 다시 조회하거나 고객센터로 문의해 주세요.';
        setStepState(stepGenerating, 'active');
        setStepState(stepDownload, 'pending');
      } else if (status === 'payment_cancelled') {
        generationStep.textContent = '리포트 제작이 시작되지 않았습니다.';
        downloadStep.textContent = '결제 완료 후에만 모바일 리포트가 준비됩니다.';
        setStepState(stepGenerating, 'pending');
        setStepState(stepDownload, 'pending');
      } else {
        generationStep.textContent = '리포트 제작을 준비하고 있습니다.';
        downloadStep.textContent = '완료 후 모바일 리포트를 현재 화면에서 확인할 수 있습니다.';
        setStepState(stepGenerating, 'pending');
        setStepState(stepDownload, 'pending');
      }

      const stepProgressText = {
        payment_pending: '결제 승인 여부를 확인하고 있습니다.',
        queued: '리포트 제작이 접수되었습니다.',
        payment_success: '리포트 제작이 접수되었습니다.',
        generation: '리포트 제작을 시작하고 있습니다.',
        mansae: '입력하신 생년월일시를 바탕으로 사주 정보를 계산하고 있습니다.',
        saju: '사주 원국과 기본 해석 데이터를 정리하고 있습니다.',
        period: '운의 흐름 데이터를 정리하고 있습니다.',
        compatibility_api: '관계 참고 데이터를 정리하고 있습니다.',
        kie_ai: '사주 원국과 운의 흐름을 바탕으로 해석 문장을 작성하고 있습니다.',
        core: '핵심 요약과 원국 해석을 작성하고 있습니다.',
        timing: '대운, 세운, 월운 흐름을 작성하고 있습니다.',
        analysis: '재물, 직업, 성향 해석을 작성하고 있습니다.',
        life: '생활 전반 조언을 작성하고 있습니다.',
        concern: '고민에 대한 맞춤 조언을 작성하고 있습니다.',
        compatibility: '관계 분석 문장을 작성하고 있습니다.',
        html_render: '완성된 해석 내용을 모바일 리포트 화면으로 정리하고 있습니다.',
        completed: '리포트가 준비되었습니다.'
      };
      const defaultProgress = status === 'payment_pending'
        ? 5
        : isQueued
          ? 10
          : status === 'generating'
            ? 60
            : isCompleted
              ? 100
              : status === 'failed'
                ? 97
                : status === 'payment_cancelled'
                  ? 0
                  : 0;
      const progressText = completedButMissingSections
        ? '리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.'
        : isCompleted
          ? (hasRenderableSections
              ? '리포트 생성이 완료되었습니다.'
              : '리포트 표시를 다시 확인해 주세요.')
          : status === 'failed'
            ? '리포트 제작 중 일시적인 문제가 발생했습니다. 잠시 후 다시 확인해주세요.'
            : status === 'payment_cancelled'
              ? '결제가 취소되어 진행이 중단되었습니다.'
              : (stepProgressText[currentStep || status] || '리포트 제작 상태를 확인하고 있습니다.');
      applyProgress(progress ?? defaultProgress, progressText);

      const updatedText = renderData.updatedAt ? `\n\n최근 갱신: ${new Date(renderData.updatedAt).toLocaleString('ko-KR')}` : '';
      detailBox.hidden = false;
      detailBox.textContent = completedButMissingSections
        ? `리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.${updatedText}`
        : `${renderData.message || '리포트 상태를 계속 확인하고 있습니다.'}${updatedText}`;

      if (isCompleted && renderData.viewMode === 'html' && hasRenderableSections) {
        renderHtmlReport(renderData);
      }
    }

    async function poll() {
      if (pollingStopped || requestInFlight) return;
      if (!activeOrderId) {
        statusBadge.textContent = '리포트 연결 필요';
        receiptMetaBox.hidden = true;
        loadingPanel.hidden = true;
        timelinePanel.hidden = true;
        refreshButton.hidden = true;
        detailBox.textContent = '이 화면은 결제 완료 후 자동으로 연결되는 전용 리포트 페이지입니다.';
        applyProgress(0, '정상적인 주문 연결이 필요합니다.');
        return;
      }
      requestInFlight = true;
      try {
        const res = await fetch(`/api/orders/${encodeURIComponent(activeOrderId)}/status?t=${Date.now()}`, { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
        const data = await res.json();
        if (data.status === 'completed' && data.viewMode === 'html' && data.reportSections && Object.keys(data.reportSections).length) {
          const persistedSections = saveCompletedReport(activeOrderId, data.reportSections) || data.reportSections;
          data.reportSections = persistedSections;
          stopPolling();
        } else if (['ready', 'completed', 'failed', 'payment_cancelled'].includes(data.status)) {
          stopPolling();
        }
        renderStatus(data);
        if (!pollingStopped && !['ready', 'completed', 'failed', 'payment_cancelled'].includes(data.status)) {
          schedulePoll(4000);
        }
      } catch (error) {
        if (!pollingStopped) {
          detailBox.hidden = false;
          detailBox.textContent = '상태를 확인하는 중 일시적인 오류가 발생했습니다. 잠시 후 다시 시도합니다.';
          applyProgress(12, '상태를 다시 확인하고 있습니다.');
          schedulePoll(5000);
        }
      } finally {
        requestInFlight = false;
      }
    }

    refreshButton?.addEventListener('click', () => {
      pollingStopped = false;
      requestInFlight = false;
      completedReportState = null;
      renderedCompletedOrderId = null;
      if (pollTimer) {
        window.clearTimeout(pollTimer);
        pollTimer = null;
      }
      window.location.reload();
    });
    poll();
  </script>
</body>
</html>
