<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daon Premium Saju 리포트 상태</title>
  <style>
    :root {
      --bg: #faf6f1;
      --card: #fffdf9;
      --line: #eadccf;
      --text: #332924;
      --sub: #6e6057;
      --accent: #8b5e3c;
      --accent-soft: #f7efe8;
      --ok: #216e4f;
      --ok-bg: #eaf7f0;
      --warn: #8d5b00;
      --warn-bg: #fff5dd;
      --err: #9d2f2f;
      --err-bg: #fdeaea;
      --shadow: 0 18px 40px rgba(71, 44, 25, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
      color: var(--text);
      padding: 24px;
    }
    .wrap { max-width: 860px; margin: 0 auto; display: grid; gap: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.25; }
    h2 { margin: 0 0 12px; font-size: 18px; line-height: 1.4; }
    p { margin: 0; line-height: 1.7; color: var(--sub); }
    .top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px; border-radius: 999px;
      padding: 8px 12px; font-size: 13px; font-weight: 800; white-space: nowrap;
    }
    .badge.ok { background: var(--ok-bg); color: var(--ok); }
    .badge.warn { background: var(--warn-bg); color: var(--warn); }
    .badge.err { background: var(--err-bg); color: var(--err); }
    .badge.neutral { background: var(--accent-soft); color: var(--accent); }
    .loading {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid #dbc8b7;
      border-top-color: var(--accent); animation: spin .9s linear infinite; display: inline-block;
      vertical-align: middle; margin-right: 8px;
    }
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 10px 14px; margin-top: 16px; font-size: 14px; }
    .kv dt { color: var(--sub); font-weight: 700; }
    .kv dd { margin: 0; color: var(--text); word-break: break-all; }
    .note { margin-top: 14px; padding: 14px 16px; border-radius: 16px; background: var(--accent-soft); color: var(--text); line-height: 1.65; font-size: 14px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 0 16px;
      border-radius: 14px; border: 1px solid var(--text); text-decoration: none; color: #fff;
      background: var(--text); font-weight: 800;
    }
    .btn.secondary { background: #fff; color: var(--text); border-color: var(--line); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }
    .hidden { display: none !important; }
    pre {
      margin: 0; padding: 14px 16px; border-radius: 16px; background: #fff; border: 1px solid var(--line);
      overflow: auto; white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="top">
        <div>
          <h1>프리미엄 리포트 생성 상태</h1>
          <p id="summaryText">주문 상태를 확인하는 중입니다.</p>
        </div>
        <div id="statusBadge" class="badge neutral"><span class="loading"></span>불러오는 중</div>
      </div>
      <dl class="kv">
        <dt>주문번호</dt>
        <dd id="orderId" class="mono">-</dd>
        <dt>진행 상태</dt>
        <dd id="statusText">-</dd>
        <dt>안내</dt>
        <dd id="messageText">-</dd>
      </dl>
      <div id="infoBox" class="note">보통 3~7분 정도 소요됩니다. 완료되면 결과 화면으로 이동하거나 아래 버튼으로 확인하실 수 있습니다.</div>
      <div class="actions">
        <a id="refreshLink" class="btn secondary" href="javascript:void(0)">새로고침</a>
        <a id="homeLink" class="btn secondary" href="/">메인으로</a>
        <a id="reportLink" class="btn hidden" href="#">리포트 보기</a>
      </div>
    </section>

    <section class="card hidden" id="debugCard">
      <h2>디버그 정보</h2>
      <pre id="debugPre">-</pre>
    </section>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const orderId = qs.get('orderId') || '';
    const orderIdEl = document.getElementById('orderId');
    const summaryTextEl = document.getElementById('summaryText');
    const statusTextEl = document.getElementById('statusText');
    const messageTextEl = document.getElementById('messageText');
    const statusBadgeEl = document.getElementById('statusBadge');
    const reportLinkEl = document.getElementById('reportLink');
    const refreshLinkEl = document.getElementById('refreshLink');
    const debugCardEl = document.getElementById('debugCard');
    const debugPreEl = document.getElementById('debugPre');

    orderIdEl.textContent = orderId || 'orderId 없음';

    function normalizeArray(value) {
      return Array.isArray(value) ? value.filter(Boolean) : [];
    }

    function deriveUiState(payload) {
      const rawFailedSections = normalizeArray(payload.failedSections);
      const status = String(payload.status || 'processing');
      const fatalCount = rawFailedSections.length;
      return { status, fatalCount, rawFailedSections };
    }

    function getCustomerView(status, hasFatalFailure) {
      if (status === 'completed') {
        return {
          badge: { cls: 'ok', text: '완료' },
          statusText: '리포트 작성 완료',
          summary: '리포트 작성이 완료되었습니다.',
          message: '아래 버튼을 눌러 결과를 확인해 주세요.'
        };
      }
      if (status === 'failed' && hasFatalFailure) {
        return {
          badge: { cls: 'err', text: '안내 필요' },
          statusText: '일시적 문제 발생',
          summary: '리포트 생성 중 일시적인 문제가 발생했습니다.',
          message: '결제는 정상 확인되었으며, 고객센터로 문의해 주시면 확인 후 안내드리겠습니다.'
        };
      }
      return {
        badge: { cls: 'neutral', text: '생성 중' },
        statusText: '리포트 작성 중',
        summary: '프리미엄 리포트를 작성하고 있습니다.',
        message: '입력하신 사주 정보를 바탕으로 해석 문장을 정리하고 있습니다. 보통 3~7분 정도 소요됩니다. 완료되면 자동으로 결과 화면으로 이동합니다. 잠시만 기다려 주세요.'
      };
    }

    function buildDebugPayload(payload) {
      return JSON.stringify({
        orderId: payload.orderId || null,
        status: payload.status || null,
        progress: payload.progress ?? null,
        currentStep: payload.currentStep || null,
        failedStep: payload.failedStep || null,
        failedBatch: payload.failedBatch || null,
        failedSections: normalizeArray(payload.failedSections),
        message: payload.message || null
      }, null, 2);
    }

    async function loadStatus(manual = false) {
      if (!orderId) {
        statusBadgeEl.className = 'badge err';
        statusBadgeEl.textContent = 'orderId 없음';
        summaryTextEl.textContent = '주문번호가 없어 상태를 불러올 수 없습니다.';
        messageTextEl.textContent = '주문번호를 다시 확인해 주세요.';
        return;
      }

      if (manual) {
        statusBadgeEl.className = 'badge neutral';
        statusBadgeEl.innerHTML = '<span class="loading"></span>새로고침 중';
      }

      try {
        const response = await fetch(`/api/orders/${encodeURIComponent(orderId)}/status`, {
          cache: 'no-store',
          headers: { 'cache-control': 'no-cache' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const payload = await response.json();
        const ui = deriveUiState(payload);
        const isDebugMode = qs.get('debug') === '1' || payload.debugVisible === true;
        const customerView = getCustomerView(ui.status, ui.fatalCount > 0);

        statusBadgeEl.className = `badge ${customerView.badge.cls}`;
        statusBadgeEl.textContent = customerView.badge.text;
        statusTextEl.textContent = customerView.statusText;
        summaryTextEl.textContent = customerView.summary;
        messageTextEl.textContent = customerView.message;

        const hasReport = Boolean(payload.reportUrl || payload.viewUrl || payload.report || payload.reportSections);
        if (ui.status === 'completed' && hasReport) {
          reportLinkEl.classList.remove('hidden');
          reportLinkEl.href = payload.reportUrl || payload.viewUrl || `/report/view?orderId=${encodeURIComponent(orderId)}`;
        } else {
          reportLinkEl.classList.add('hidden');
          reportLinkEl.removeAttribute('href');
        }

        if (isDebugMode) {
          debugCardEl.classList.remove('hidden');
          debugPreEl.textContent = buildDebugPayload(payload);
        } else {
          debugCardEl.classList.add('hidden');
          debugPreEl.textContent = '-';
        }

        if (ui.status !== 'completed' && !(ui.status === 'failed' && ui.fatalCount > 0)) {
          window.setTimeout(() => loadStatus(false), 5000);
        }
      } catch (error) {
        statusBadgeEl.className = 'badge err';
        statusBadgeEl.textContent = '불러오기 실패';
        summaryTextEl.textContent = '리포트 상태를 확인하는 중 문제가 발생했습니다.';
        messageTextEl.textContent = '잠시 후 다시 시도해 주세요.';
      }
    }

    refreshLinkEl.addEventListener('click', () => loadStatus(true));
    loadStatus(false);
  </script>

</body>
</html>
