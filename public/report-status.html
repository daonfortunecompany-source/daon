<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>상담 안내 | 다온사주</title>
  <meta name="description" content="상세 사주풀이는 카카오톡 상담으로 신청하실 수 있으며, 상담 후 24시간 내 40~50P 분량의 PDF 파일로 전달드립니다." />
  <style>
    :root {
      --bg: #f8f3ed;
      --card: rgba(255,255,255,.96);
      --line: #eddccc;
      --text: #312825;
      --muted: #6f635c;
      --primary: #c9806e;
      --shadow: 0 20px 42px rgba(95, 72, 56, .1);
      --radius: 28px;
      --shell: 430px;
    }
    * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--text);
      background: linear-gradient(180deg, #f8f2ec 0%, #fffaf6 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: min(100%, var(--shell));
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px 20px;
    }
    h1, p { margin: 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff7ee;
      border: 1px solid #f1dfce;
      color: #7b6458;
      font-size: 12px;
      font-weight: 800;
    }
    h1 {
      margin-top: 14px;
      font-size: 30px;
      line-height: 1.22;
      letter-spacing: -.05em;
    }
    .lead {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.74;
      white-space: pre-line;
    }
    .note {
      margin-top: 16px;
      padding: 15px 16px;
      border-radius: 20px;
      background: #fffaf3;
      border: 1px solid #efdfcf;
      color: #5b4d45;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-line;
    }
    .actions {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 56px;
      padding: 0 18px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -.03em;
      text-align: center;
      text-decoration: none;
    }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #e09a86);
      box-shadow: 0 14px 28px rgba(201,128,110,.26);
    }
    .btn-soft {
      color: var(--text);
      background: #fff;
      border: 1px solid #ead9c8;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">카카오톡 상담으로 안내드립니다</div>
    <h1>현재 상세 사주풀이는<br />카카오톡 상담으로 진행됩니다</h1>
    <p class="lead">상담 후 24시간 내,
전문가가 직접 작성한 40~50P 분량의 PDF 파일을 전달드립니다.</p>
    <div class="note">생년월일, 태어난 시간, 현재 고민을 남겨주시면
사주풀이 전문가가 직접 확인 후 맞춤 풀이를 작성해드립니다.</div>
    <div class="actions">
      <a class="btn btn-primary" href="http://pf.kakao.com/_dhIxfX/chat" target="_blank" rel="noopener noreferrer">상세 사주풀이 신청하기</a>
      <a class="btn btn-soft" href="/">메인으로 돌아가기</a>
    </div>
  </main>
</body>
</html>
