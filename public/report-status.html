<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daon Premium Saju 리포트 상태</title>
  <style>
    :root {
      --bg: #faf6f1;
      --card: #fffdf9;
      --line: #eadccf;
      --text: #332924;
      --sub: #6e6057;
      --accent: #8b5e3c;
      --accent-soft: #f7efe8;
      --ok: #216e4f;
      --ok-bg: #eaf7f0;
      --warn: #8d5b00;
      --warn-bg: #fff5dd;
      --err: #9d2f2f;
      --err-bg: #fdeaea;
      --shadow: 0 18px 40px rgba(71, 44, 25, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
      color: var(--text);
      padding: 24px;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.4;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: var(--sub);
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.ok { background: var(--ok-bg); color: var(--ok); }
    .badge.warn { background: var(--warn-bg); color: var(--warn); }
    .badge.err { background: var(--err-bg); color: var(--err); }
    .badge.neutral { background: var(--accent-soft); color: var(--accent); }
    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px 14px;
      margin-top: 16px;
      font-size: 14px;
    }
    .kv dt { color: var(--sub); font-weight: 700; }
    .kv dd { margin: 0; color: var(--text); word-break: break-all; }
    .note {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--accent-soft);
      color: var(--text);
      line-height: 1.65;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }
    .section-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }
    .section-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .section-item small {
      display: block;
      color: var(--sub);
      line-height: 1.55;
    }
    .section-item.pass { border-color: #cfe7da; background: #fbfffc; }
    .section-item.recoverable { border-color: #f1dfb4; background: #fffdfa; }
    .section-item.fatal { border-color: #f0c8c8; background: #fffafa; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--text);
      text-decoration: none;
      color: #fff;
      background: var(--text);
      font-weight: 800;
    }
    .btn.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .hidden { display: none !important; }
    .loading {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #dbc8b7;
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="top">
        <div>
          <h1>프리미엄 리포트 생성 상태</h1>
          <p id="summaryText">주문 상태를 확인하는 중입니다.</p>
        </div>
        <div id="statusBadge" class="badge neutral"><span class="loading"></span>불러오는 중</div>
      </div>
      <dl class="kv">
        <dt>주문번호</dt>
        <dd id="orderId" class="mono">-</dd>
        <dt>현재 상태</dt>
        <dd id="statusText">-</dd>
        <dt>마지막 안내</dt>
        <dd id="messageText">-</dd>
      </dl>
      <div id="infoBox" class="note">구조 보정이 가능한 섹션은 서버에서 자동 보정 후 완료 처리되며, 실제로 치명적인 실패가 있는 경우에만 실패로 표시됩니다.</div>
      <div class="actions">
        <a id="refreshLink" class="btn secondary" href="javascript:void(0)">새로고침</a>
        <a id="homeLink" class="btn secondary" href="/">메인으로</a>
        <a id="reportLink" class="btn hidden" href="#">리포트 보기</a>
      </div>
    </section>

    <section class="card">
      <h2>섹션별 처리 결과</h2>
      <div id="sectionsGrid" class="grid"></div>
    </section>

    <section class="card hidden" id="fatalCard">
      <h2>확인이 필요한 치명적 실패</h2>
      <p id="fatalText">-</p>
    </section>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const orderId = qs.get('orderId') || '';
    const orderIdEl = document.getElementById('orderId');
    const summaryTextEl = document.getElementById('summaryText');
    const statusTextEl = document.getElementById('statusText');
    const messageTextEl = document.getElementById('messageText');
    const statusBadgeEl = document.getElementById('statusBadge');
    const sectionsGridEl = document.getElementById('sectionsGrid');
    const fatalCardEl = document.getElementById('fatalCard');
    const fatalTextEl = document.getElementById('fatalText');
    const reportLinkEl = document.getElementById('reportLink');
    const refreshLinkEl = document.getElementById('refreshLink');

    orderIdEl.textContent = orderId || 'orderId 없음';
    refreshLinkEl.addEventListener('click', () => loadStatus(true));

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeArray(value) {
      return Array.isArray(value) ? value.filter(Boolean) : [];
    }

    function deriveUiState(payload) {
      const runtimeReport = payload && typeof payload.runtimeReport === 'object' ? payload.runtimeReport : {};
      const sectionStates = runtimeReport && typeof runtimeReport.sectionStates === 'object' ? runtimeReport.sectionStates : {};
      const rawFailedSections = normalizeArray(payload.failedSections);
      const recoverableSections = normalizeArray(runtimeReport.recoverableSections);
      const fatalFailedSections = rawFailedSections.filter((name) => {
        const state = sectionStates[name];
        return !state || state.severity === 'FATAL';
      });

      let status = String(payload.status || 'processing');
      if (status === 'failed' && fatalFailedSections.length === 0) {
        status = payload.report || payload.sections || runtimeReport.reportReady ? 'completed' : 'processing';
      }

      return {
        status,
        runtimeReport,
        sectionStates,
        recoverableSections,
        fatalFailedSections
      };
    }

    function badgeSpec(status, fatalCount, recoverableCount) {
      if (status === 'completed') {
        return recoverableCount > 0
          ? { cls: 'warn', text: '보정 후 완료' }
          : { cls: 'ok', text: '완료' };
      }
      if (status === 'failed' && fatalCount > 0) return { cls: 'err', text: '치명적 실패' };
      if (status === 'paid' || status === 'processing' || status === 'generating' || status === 'queued') return { cls: 'neutral', text: '생성 중' };
      return { cls: 'neutral', text: status || '확인 중' };
    }

    function summaryMessage(status, fatalCount, recoverableCount) {
      if (status === 'completed' && recoverableCount > 0) {
        return '일부 섹션은 구조를 자동 보정해 정상 완료했습니다. 리포트 열람이 가능합니다.';
      }
      if (status === 'completed') return '리포트 생성이 완료되었습니다.';
      if (status === 'failed' && fatalCount > 0) return '자동 보정으로 해결되지 않는 치명적 오류가 남아 있습니다.';
      return '현재 리포트를 생성하고 있습니다. 잠시 후 자동으로 다시 확인됩니다.';
    }

    function buildSectionCards(sectionStates, recoverableSections, fatalFailedSections) {
      const sectionNames = new Set([
        ...Object.keys(sectionStates || {}),
        ...recoverableSections,
        ...fatalFailedSections,
        '대운', '세운', '월운', '운성'
      ]);

      const html = [...sectionNames].map((name) => {
        const state = sectionStates[name] || {};
        const severity = state.severity || (fatalFailedSections.includes(name) ? 'FATAL' : recoverableSections.includes(name) ? 'RECOVERABLE' : 'PASS');
        const cls = severity === 'FATAL' ? 'fatal' : severity === 'RECOVERABLE' ? 'recoverable' : 'pass';
        const title = severity === 'FATAL'
          ? '치명적 오류'
          : severity === 'RECOVERABLE'
            ? '서버 보정 완료'
            : '정상 통과';
        const reasons = normalizeArray(state.issues).join(', ') || (severity === 'PASS' ? '검증 통과' : '세부 사유 없음');
        return `
          <article class="section-item ${cls}">
            <strong>${escapeHtml(name)}</strong>
            <small>${escapeHtml(title)}</small>
            <small>${escapeHtml(reasons)}</small>
          </article>
        `;
      }).join('');

      sectionsGridEl.innerHTML = html;
    }

    async function loadStatus(manual = false) {
      if (!orderId) {
        statusBadgeEl.className = 'badge err';
        statusBadgeEl.textContent = 'orderId 없음';
        summaryTextEl.textContent = '주문번호가 없어 상태를 불러올 수 없습니다.';
        return;
      }

      if (manual) {
        statusBadgeEl.className = 'badge neutral';
        statusBadgeEl.innerHTML = '<span class="loading"></span>새로고침 중';
      }

      try {
        const response = await fetch(`/api/orders/${encodeURIComponent(orderId)}/status`, {
          cache: 'no-store',
          headers: { 'cache-control': 'no-cache' }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const ui = deriveUiState(payload);
        const badge = badgeSpec(ui.status, ui.fatalFailedSections.length, ui.recoverableSections.length);

        statusBadgeEl.className = `badge ${badge.cls}`;
        statusBadgeEl.textContent = badge.text;
        statusTextEl.textContent = ui.status;
        messageTextEl.textContent = payload.publicMessage || payload.message || payload.progressMessage || '-';
        summaryTextEl.textContent = summaryMessage(ui.status, ui.fatalFailedSections.length, ui.recoverableSections.length);

        buildSectionCards(ui.sectionStates, ui.recoverableSections, ui.fatalFailedSections);

        if (ui.fatalFailedSections.length > 0) {
          fatalCardEl.classList.remove('hidden');
          fatalTextEl.textContent = `${ui.fatalFailedSections.join(', ')} 섹션에 치명적 오류가 남아 있어 재생성이 필요합니다.`;
        } else {
          fatalCardEl.classList.add('hidden');
        }

        const hasReport = Boolean(payload.reportUrl || payload.viewUrl || payload.report || (payload.runtimeReport && payload.runtimeReport.reportReady));
        if (ui.status === 'completed' && hasReport) {
          reportLinkEl.classList.remove('hidden');
          reportLinkEl.href = payload.reportUrl || payload.viewUrl || `/report/view?orderId=${encodeURIComponent(orderId)}`;
        } else {
          reportLinkEl.classList.add('hidden');
          reportLinkEl.removeAttribute('href');
        }

        if (ui.status !== 'completed' && !(ui.status === 'failed' && ui.fatalFailedSections.length > 0)) {
          window.setTimeout(() => loadStatus(false), 5000);
        }
      } catch (error) {
        statusBadgeEl.className = 'badge err';
        statusBadgeEl.textContent = '불러오기 실패';
        summaryTextEl.textContent = '상태를 가져오는 중 문제가 발생했습니다. 잠시 후 다시 시도해 주세요.';
        messageTextEl.textContent = error && error.message ? error.message : '알 수 없는 오류';
      }
    }

    loadStatus(false);
  </script>
</body>
</html>
