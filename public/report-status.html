<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>리포트 생성 상태 | 다온사주</title>
  <style>
    :root {
      --bg: #f8f5f0;
      --card: #fffdf9;
      --line: #eadfd2;
      --text: #352c29;
      --muted: #6f625b;
      --primary: #cf8f7a;
      --primary-soft: #fff5f0;
      --good: #7db4a5;
      --shadow: 0 20px 40px rgba(95, 72, 56, .08);
      --radius: 26px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f7f3ee 0%, #fdfaf6 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      padding: 18px;
    }
    .card {
      width: min(100%, 430px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
    }
    h1, h2, p { margin: 0; }
    h1 { font-size: 26px; letter-spacing: -.04em; }
    .sub { margin-top: 10px; color: var(--muted); line-height: 1.7; font-size: 14px; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      border: 1px solid #f0ddd1;
      color: #8b5d53;
      font-weight: 800;
      font-size: 13px;
    }

    .loading-panel {
      margin-top: 18px;
      border: 1px solid #f0e2d6;
      border-radius: 22px;
      background: linear-gradient(180deg, #fffaf6 0%, #fff 100%);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 58px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid #f1ded5;
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
      flex: 0 0 auto;
    }

    .loading-copy {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 800;
      color: #6d5247;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .loading-copy .base {
      animation: breathe 1.6s ease-in-out infinite;
    }

    .loading-dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 24px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      opacity: .3;
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: .18s; }
    .loading-dots span:nth-child(3) { animation-delay: .36s; }

    .progress-shell {
      display: grid;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #f2e8df;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #e3a694 0%, #cf8f7a 45%, #b97669 100%);
      transition: width .45s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.8s linear infinite;
    }

    .timeline {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px 14px;
      position: relative;
      overflow: hidden;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .timeline-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(207,143,122,.08), rgba(255,255,255,0));
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
    }

    .timeline-item strong { display: block; font-size: 14px; margin-bottom: 6px; }
    .timeline-item span { color: var(--muted); font-size: 13px; line-height: 1.65; display: block; }

    .step-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .02em;
      color: #927160;
      text-transform: uppercase;
    }

    .step-kicker i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d8c8bc;
      display: inline-block;
      flex: 0 0 auto;
    }

    .timeline-item.active {
      border-color: #e1b8a9;
      background: linear-gradient(180deg, #fff8f3 0%, #fff 100%);
      box-shadow: 0 14px 28px rgba(207, 143, 122, .14);
      transform: translateY(-1px);
    }

    .timeline-item.active::after {
      opacity: 1;
      animation: stepGlow 1.6s ease-in-out infinite;
    }

    .timeline-item.active .step-kicker i {
      background: var(--primary);
      box-shadow: 0 0 0 6px rgba(207,143,122,.12);
      animation: pulseDot 1.3s ease-in-out infinite;
    }

    .timeline-item.done {
      border-color: #d5e8e1;
      background: linear-gradient(180deg, #f6fbf9 0%, #fff 100%);
    }

    .timeline-item.done .step-kicker {
      color: #538170;
    }

    .timeline-item.done .step-kicker i {
      background: var(--good);
      box-shadow: 0 0 0 6px rgba(125,180,165,.12);
    }

    .timeline-item.pending .step-kicker i {
      background: #d8c8bc;
      box-shadow: none;
    }

    .detail {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: #f8f3ee;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
      white-space: pre-line;
    }

    [hidden] { display: none !important; }

    .meta-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fffaf6;
      display: grid;
      gap: 8px;
    }

    .meta-box strong { font-size: 13px; }
    .meta-box code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: rgba(255,255,255,.8);
      padding: 2px 6px;
      border-radius: 8px;
      color: #6d5247;
    }

    .meta-box .meta-note,
    .report-meta-card .meta-note {
      color: #8a6f61;
      font-size: 12px;
      line-height: 1.65;
    }

    .lookup-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .actions {
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      min-height: 52px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #e2a38e);
      color: white;
      box-shadow: 0 12px 24px rgba(207,143,122,.22);
    }

    .btn-soft {
      background: rgba(255,255,255,.86);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .is-final .spinner,
    .is-final .loading-dots,
    .is-final .progress-bar::after {
      animation: none;
    }

    .is-final .spinner {
      border-color: #d7ebe4;
      border-top-color: var(--good);
    }

    .is-failed .loading-copy,
    .is-failed .status-badge {
      color: #9a4b43;
    }

    .report-view {
      display: grid;
      gap: 14px;
      margin-top: 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }

    .report-notice {
      background: #fff7f1;
      border: 1px solid #f0ddd1;
      border-radius: 18px;
      padding: 16px;
      color: #6f5b50;
      line-height: 1.7;
      font-size: 14px;
    }

    .report-meta-card,
    .report-card {
      background: #fffdfa;
      border: 1px solid #eadfd2;
      border-radius: 20px;
      padding: 18px 16px;
      box-shadow: 0 8px 26px rgba(53, 44, 41, 0.06);
    }

    .report-meta-card {
      display: grid;
      gap: 8px;
    }

    .report-meta-card h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      color: #352c29;
    }

    .report-card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
      color: #352c29;
    }

    .report-card p {
      margin: 0 0 12px;
      line-height: 1.9;
      font-size: 15px;
      color: #4d4340;
      word-break: keep-all;
      font-weight: 400;
    }

    .report-summary-title {
      margin: 2px 0 10px;
      font-weight: 700;
      color: #352c29;
    }

    .report-list {
      margin: 2px 0 14px 0;
      padding-left: 18px;
      color: #4d4340;
    }

    .report-list li {
      margin: 0 0 8px;
      line-height: 1.85;
      font-size: 15px;
      word-break: keep-all;
      font-weight: 400;
    }

    .report-card p strong,
    .report-card p b,
    .report-list li strong,
    .report-list li b {
      font-weight: 400;
    }

    .report-copy-wrap {
      position: static;
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding-top: 4px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .copy-feedback {
      font-size: 13px;
      color: #6f625b;
      text-align: center;
      min-height: 20px;
    }

    .copy-toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%) translateY(12px);
      width: min(calc(100% - 32px), 380px);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(53, 44, 41, 0.92);
      color: #fff;
      font-size: 13px;
      line-height: 1.6;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      box-shadow: 0 16px 32px rgba(53, 44, 41, 0.18);
      z-index: 30;
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .copy-toast.error {
      background: rgba(154, 75, 67, 0.95);
    }

    .report-copy-btn {
      width: 100%;
      padding: 16px 18px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #cf8f7a, #b87562);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(207, 143, 122, 0.28);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: translateY(0); opacity: .25; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes breathe {
      0%, 100% { opacity: .72; }
      50% { opacity: 1; }
    }
    @keyframes shimmer {
      to { transform: translateX(100%); }
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes stepGlow {
      0%, 100% { opacity: .45; }
      50% { opacity: .9; }
    }

    @media (max-width: 420px) {
      .card {
        padding: 22px 16px;
      }
      h1 { font-size: 24px; }
      .loading-row {
        gap: 10px;
        min-height: 54px;
      }
      .loading-copy {
        font-size: 14px;
      }
      .report-card {
        padding: 16px 14px;
      }
      .report-card h2 {
        font-size: 17px;
      }
      .report-card p {
        font-size: 14px;
        line-height: 1.85;
      }
    }
  </style>
</head>
<body>
  <main class="card" id="statusCard">
    <h1>리포트 제작 상태</h1>
    <p class="sub">리포트 생성 중입니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요. 생성 완료 후 리포트가 현재 화면에 표시됩니다.</p>
    <div class="status-badge" id="statusBadge">상태 확인 중...</div>

    <section class="meta-box" id="receiptMetaBox" hidden></section>

    <section class="loading-panel" id="loadingPanel" aria-label="리포트 생성 진행 상태">
      <div class="loading-row">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-copy" aria-live="polite">
          <span class="base" id="loadingText">리포트 생성 중</span>
          <span class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </div>
      </div>
      <div class="progress-shell">
        <div class="progress-meta">
          <span id="progressLabel">진행 상태를 확인하고 있습니다.</span>
          <span id="progressValue">0%</span>
        </div>
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </section>

    <section class="timeline" id="timelinePanel">
      <article class="timeline-item pending" id="stepPayment">
        <div class="step-kicker"><i></i><span>Step 1</span></div>
        <strong>1. 결제 확인</strong>
        <span id="paymentStep">결제 승인 여부를 확인하고 있습니다.</span>
      </article>
      <article class="timeline-item pending" id="stepGenerating">
        <div class="step-kicker"><i></i><span>Step 2</span></div>
        <strong>2. 리포트 생성</strong>
        <span id="generationStep">사주 원국과 해석을 정리하고 있습니다.</span>
      </article>
      <article class="timeline-item pending" id="stepDownload">
        <div class="step-kicker"><i></i><span>Step 3</span></div>
        <strong>3. 리포트 화면 표시</strong>
        <span id="downloadStep">완료 후 모바일 리포트를 현재 화면에서 확인할 수 있습니다.</span>
      </article>
    </section>

    <div class="detail" id="detailBox">주문 정보를 불러오는 중입니다.</div>

    <section class="meta-box" id="debugBox" hidden></section>

    <div class="actions" id="actions">
      <button class="btn btn-primary" id="refreshButton" type="button">다시 확인하기</button>
      <a class="btn btn-soft" href="/">메인으로 돌아가기</a>
    </div>

    <section class="report-view" id="reportView" hidden></section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const isDebugMode = params.get('debug') === '1';
    const initialOrderId = params.get('orderId') || params.get('order');
    let activeOrderId = initialOrderId;
    const pageTitle = document.querySelector('h1');
    const statusCard = document.getElementById('statusCard');
    const statusSub = document.querySelector('.sub');
    const statusBadge = document.getElementById('statusBadge');
    const refreshButton = document.getElementById('refreshButton');
    const paymentStep = document.getElementById('paymentStep');
    const generationStep = document.getElementById('generationStep');
    const downloadStep = document.getElementById('downloadStep');
    const detailBox = document.getElementById('detailBox');
    const actions = document.getElementById('actions');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const progressValue = document.getElementById('progressValue');
    const loadingText = document.getElementById('loadingText');
    const stepPayment = document.getElementById('stepPayment');
    const stepGenerating = document.getElementById('stepGenerating');
    const stepDownload = document.getElementById('stepDownload');
    const receiptMetaBox = document.getElementById('receiptMetaBox');
    const debugBox = document.getElementById('debugBox');
    const loadingPanel = document.getElementById('loadingPanel');
    const timelinePanel = document.getElementById('timelinePanel');
    const reportView = document.getElementById('reportView');
    const REPORT_SECTION_ORDER = ['핵심 요약','사주 원국 해석','대운','세운','월운','운성','신살·귀인','십성','재물운','직업운','애정운','자녀운','건강운','실천 조언','주의할 점','고민에 대한 조언','관계/궁합 해석'];
    const REPORT_CACHE_PREFIX = 'daon-runtime-report:';
    let pollTimer = null;
    let pollingStopped = false;
    let requestInFlight = false;
    let completedReportState = null;
    let renderedCompletedOrderId = null;

    function cloneJson(value) {
      return value ? JSON.parse(JSON.stringify(value)) : null;
    }

    function getReportCacheKey(orderId) {
      return `${REPORT_CACHE_PREFIX}${orderId || ''}`;
    }

    function saveCompletedReport(orderId, sections) {
      if (!orderId || !sections) return null;
      const cloned = cloneJson(sections);
      completedReportState = { orderId, sections: cloned };
      try {
        sessionStorage.setItem(getReportCacheKey(orderId), JSON.stringify(cloned));
      } catch (error) {
      }
      return cloned;
    }

    function loadCompletedReport(orderId) {
      if (!orderId) return null;
      if (completedReportState?.orderId === orderId && completedReportState.sections) {
        return cloneJson(completedReportState.sections);
      }
      try {
        const raw = sessionStorage.getItem(getReportCacheKey(orderId));
        const parsed = raw ? JSON.parse(raw) : null;
        if (parsed) completedReportState = { orderId, sections: parsed };
        return parsed;
      } catch (error) {
        return null;
      }
    }

    function stopPolling() {
      pollingStopped = true;
      if (pollTimer) {
        window.clearTimeout(pollTimer);
        pollTimer = null;
      }
    }

    function schedulePoll(delayMs) {
      if (pollingStopped) return;
      if (pollTimer) window.clearTimeout(pollTimer);
      pollTimer = window.setTimeout(() => {
        pollTimer = null;
        poll();
      }, delayMs);
    }

    function setStepState(target, state) {
      if (!target) return;
      target.classList.remove('pending', 'active', 'done');
      target.classList.add(state);
    }

    function applyProgress(percent, label) {
      const safe = Math.max(0, Math.min(100, Number(percent) || 0));
      progressBar.style.width = `${safe}%`;
      progressValue.textContent = `${safe}%`;
      progressLabel.textContent = label;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildApplicantMetaMarkup(data) {
      const applicant = data.applicant || {};
      const rows = [];
      if (applicant.name) rows.push(`<div>이름: ${escapeHtml(applicant.name)}</div>`);
      if (applicant.birthDate) {
        const calendarLabel = applicant.calendarType ? ` (${escapeHtml(applicant.calendarType)})` : '';
        rows.push(`<div>생년월일: ${escapeHtml(applicant.birthDate)}${calendarLabel}</div>`);
      }
      if (applicant.displayBirthTime) rows.push(`<div>출생시간: ${escapeHtml(applicant.displayBirthTime)}</div>`);
      return rows.join('');
    }

    function renderReceiptMeta(data) {
      if (!receiptMetaBox) return;
      const expected = data.productType === 'compatibility' ? '2인 궁합 리포트는 분석 내용이 많아 몇 분 정도 소요될 수 있습니다.' : '1인 리포트는 보통 약 3~7분 정도 소요됩니다.';
      receiptMetaBox.hidden = false;
      receiptMetaBox.innerHTML = [
        '<strong>리포트 접수 정보</strong>',
        buildApplicantMetaMarkup(data),
        data.reportNote ? `<div class="meta-note">${escapeHtml(data.reportNote)}</div>` : '',
        `<div>예상 안내: ${expected}</div>`
      ].filter(Boolean).join('');
    }

    function renderDebugState(data) {
      if (!debugBox) return;
      if (!isDebugMode) {
        debugBox.hidden = true;
        debugBox.innerHTML = '';
        return;
      }
      const failedSections = Array.isArray(data.failedSections) ? data.failedSections.filter(Boolean) : [];
      const recoverableSections = Array.isArray(data.recoverableSections) ? data.recoverableSections.filter(Boolean) : [];
      const fatalSections = Array.isArray(data.fatalSections) ? data.fatalSections.filter(Boolean) : [];
      debugBox.hidden = false;
      debugBox.innerHTML = [
        '<strong>개발 확인용 상태</strong>',
        `<div>status: <code>${escapeHtml(data.status || '-')}</code></div>`,
        `<div>progress: <code>${escapeHtml(String(data.progress ?? '-'))}</code></div>`,
        `<div>currentStep: <code>${escapeHtml(data.currentStep || '-')}</code></div>`,
        `<div>failedStep: <code>${escapeHtml(data.failedStep || '-')}</code></div>`,
        `<div>failedBatch: <code>${escapeHtml(data.failedBatch || '-')}</code></div>`,
        `<div>failedSections: <code>${escapeHtml(failedSections.join(', ') || '-')}</code></div>`,
        `<div>recoverableSections: <code>${escapeHtml(recoverableSections.join(', ') || '-')}</code></div>`,
        `<div>fatalSections: <code>${escapeHtml(fatalSections.join(', ') || '-')}</code></div>`,
        `<div>message: <code>${escapeHtml(data.message || '-')}</code></div>`
      ].join('');
    }

    function getReportSectionTitle(title, body = '', applicantName = '') {
      if (title === '신살·귀인' || title === '신살,귀인') {
        return /(천을귀인|문창귀인|월덕귀인|천덕귀인|도화살|역마살|화개살)/.test(body)
          ? '신살·귀인'
          : '귀인과 주변 도움의 흐름';
      }
      if (title === '운성') {
        return /(장생|목욕|관대|건록|제왕|쇠|병|사|묘|절|태|양)/.test(body)
          ? '운성'
          : '에너지 리듬과 회복 패턴';
      }
      if (title === '고민에 대한 조언' && /^현재 흐름에 대한 조언/.test(String(body || '').trim())) {
        return '현재 흐름에 대한 조언';
      }
      return title;
    }

    function stripInlineFormatting(text) {
      return String(text || '')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/__(.*?)__/g, '$1')
        .replace(/<\/?(?:b|strong)>/gi, '')
        .trim();
    }

    function getReportSectionBody(sections, title) {
      if (title === '신살·귀인') {
        return normalizeCustomerFacingReportText(title, String(sections['신살·귀인'] || sections['신살,귀인'] || '').trim());
      }
      return normalizeCustomerFacingReportText(title, String(sections[title] || '').trim());
    }

    function keepSingleSummaryBulletSet(text) {
      const raw = String(text || '').trim();
      if (!raw) return '';
      const summaryPattern = /(핵심 정리|대운 3줄 요약)[^\n]*\n(?:-\s*(?:강점|흐름):[^\n]*\n){1,2}-\s*주의:[^\n]*\n-\s*실천:[^\n]*/g;
      const matches = raw.match(summaryPattern);
      if (!matches || matches.length <= 1) return raw;
      const first = matches[0].trim();
      let seen = false;
      return raw.replace(summaryPattern, () => {
        if (seen) return '';
        seen = true;
        return first;
      }).replace(/\n{3,}/g, '\n\n').trim();
    }


    function normalizeCustomerFacingLineBreaks(text) {
      const labelPattern = '강점|흐름|주의|실천|조언|핵심';
      let output = String(text || '');
      output = output
        .replace(/건강운 참고 문구:\s*/g, '')
        .replace(/([.!?])\s*(핵심 정리)(?=(?:\s|$))/g, '$1\n\n$2')
        .replace(/([^\n])\s+(핵심 정리)(?=(?:\s|$))/g, '$1\n\n$2')
        .replace(/(핵심 정리|대운 3줄 요약)\s*-\s*/g, '$1\n\n- ');
      output = output.replace(new RegExp(`\s+-\s*(${labelPattern}):\s*`, 'g'), '\n- $1: ');
      output = output.replace(new RegExp(`(^|[^\n])\s+(${labelPattern}):\s*`, 'g'), (match, prefix, label) => `${prefix}\n- ${label}: `);
      output = output.replace(new RegExp(`(^|\n)\s*(${labelPattern}):\s*`, 'g'), '$1- $2: ');
      return output.replace(/\n{3,}/g, '\n\n').trim();
    }

    function normalizeSajuTerminology(text) {
      let output = String(text || '');
      let explained = false;
      output = output.replace(/중약한 기운|신약한 구조|신강하지 않은 흐름|신강하지 않은 구조|신약한 흐름/g, (match) => {
        if (!explained) {
          explained = true;
          return match === '신약한 흐름'
            ? '신약한 흐름'
            : '신약에 가까운 구조, 즉 자기 기운을 보강하는 흐름이 중요한 구조';
        }
        return '신약한 흐름';
      });
      return output.trim();
    }

    function normalizeAgeReferenceText(sectionTitle, text) {
      if (sectionTitle !== '대운') return String(text || '').trim();
      return String(text || '')
        .replace(/현재\s+30대\s+초중반\s+대운\s+흐름\s+구간/g, '2026년 기준으로 30대 초반 흐름')
        .replace(/\b(\d{1,2})세인\s+([가-힣A-Za-z0-9]+님)(께서는|은|는|이|가)?/g, (match, age, name, particle = '은') => `세는나이 기준 ${age}세에 해당하는 ${name}${particle}`)
        .replace(/(?<!기준\s)\b31세\b(?![^.]{0,12}기준)/g, '세는나이 기준 31세')
        .trim();
    }

    function stripHealthContentOutsideHealth(sectionTitle, text) {
      let output = String(text || '').replace(/건강운 참고 문구:\s*/g, '').trim();
      if (!output || sectionTitle === '건강운') return output;
      return output
        .split(/\n{2,}/)
        .map((item) => item.trim())
        .filter(Boolean)
        .filter((paragraph) => !/(의학적 진단이 아니라 생활 습관을 점검하기 위한 참고용 해석|전문의 상담|의료 전문가|검진)/.test(paragraph))
        .filter((paragraph) => !/^(?:건강과 관련된|건강 관련|건강 측면에서는|건강운 참고 문구)/.test(paragraph))
        .join('\n\n')
        .trim();
    }

    function normalizeCustomerFacingReportText(sectionTitle, text) {
      let output = stripInlineFormatting(String(text || ''));
      output = normalizeCustomerFacingLineBreaks(output);
      output = normalizeSajuTerminology(output);
      output = normalizeAgeReferenceText(sectionTitle, output);
      output = stripHealthContentOutsideHealth(sectionTitle, output);
      output = keepSingleSummaryBulletSet(output);
      return output.replace(/\n{3,}/g, '\n\n').trim();
    }

    function buildReportText(data) {
      const sections = data.reportSections || {};
      const applicant = data.applicant || {};
      const applicantName = applicant.name || '';
      const blocks = [
        '프리미엄 사주 리포트',
        applicant.name ? `이름: ${applicant.name}` : '',
        applicant.birthDate ? `생년월일: ${applicant.birthDate}${applicant.calendarType ? ` (${applicant.calendarType})` : ''}` : '',
        applicant.displayBirthTime ? `출생시간: ${applicant.displayBirthTime}` : '',
        data.reportNote || '',
        ''
      ].filter((line, index, array) => line || index === array.length - 1);
      REPORT_SECTION_ORDER.forEach((title) => {
        const body = getReportSectionBody(sections, title);
        if (!body) return;
        blocks.push(getReportSectionTitle(title, body, applicantName), normalizeInlineSummaryBullets(body, title), '');
      });
      return blocks.join('\n');
    }

    async function copyReportText(text) {
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
        }
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', 'readonly');
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(textarea);
      if (!ok) throw new Error('copy_failed');
      return true;
    }

    let copyToastTimer = null;
    function showCopyToast(message, isError = false) {
      let toast = document.getElementById('copyToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'copyToast';
        toast.className = 'copy-toast';
        toast.setAttribute('role', 'status');
        toast.setAttribute('aria-live', 'polite');
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.toggle('error', Boolean(isError));
      toast.classList.add('show');
      if (copyToastTimer) window.clearTimeout(copyToastTimer);
      copyToastTimer = window.setTimeout(() => {
        toast.classList.remove('show');
      }, 2600);
    }


    function normalizeInlineSummaryBullets(text, sectionTitle = '') {
      let output = normalizeCustomerFacingReportText(sectionTitle, text)
        .replace(/•\s*/g, '- ')
        .replace(/([가-힣A-Za-z0-9]+님)(일상(?:에서는|에서|은|에도|까지|과))/g, '$1 $2')
        .replace(/(^|[\n.!?]\s*)건강운은\s+/g, '$1건강 측면에서는 ');
      const replacements = [
        [/((?:[가-힣A-Za-z0-9\s]+님을 위한 핵심 정리|핵심 정리|대운 3줄 요약))\s*-\s*(강점|흐름):\s*([^\n]+?)\s*-\s*주의:\s*([^\n]+?)\s*-\s*실천:\s*([^\n]+)/g, '$1\n\n- $2: $3\n- 주의: $4\n- 실천: $5'],
        [/((?:[가-힣A-Za-z0-9\s]+님을 위한 핵심 정리|핵심 정리|대운 3줄 요약))\s+(강점|흐름):\s*([^\n]+?)\s+주의:\s*([^\n]+?)\s+실천:\s*([^\n]+)/g, '$1\n\n- $2: $3\n- 주의: $4\n- 실천: $5'],
        [/((?:[가-힣A-Za-z0-9\s]+님을 위한 핵심 정리|핵심 정리|대운 3줄 요약))\s*\n\s*(강점|흐름):\s*([^\n]+?)\s*\n\s*주의:\s*([^\n]+?)\s*\n\s*실천:\s*([^\n]+)/g, '$1\n\n- $2: $3\n- 주의: $4\n- 실천: $5']
      ];
      for (const [pattern, replacement] of replacements) output = output.replace(pattern, replacement);
      const labelPattern = '강점|흐름|주의|실천|핵심|조언';
      output = output.replace(new RegExp(`\s+-\s*(${labelPattern}):\s*`, 'g'), '\n- $1: ');
      output = output.replace(new RegExp(`(^|[^\n])\s+(${labelPattern}):\s*`, 'g'), (match, prefix, label) => `${prefix}\n- ${label}: `);
      output = output.replace(new RegExp(`(^|\n)\s*(${labelPattern}):\s*`, 'g'), '$1- $2: ');
      if (/^\s*자녀운\s*-\s*(강점|흐름|주의|실천|핵심|조언):/m.test(output)) {
        output = output.replace(/^\s*자녀운\s*-\s*/m, '- ');
        output = `자녀운은 실제 자녀와의 관계뿐 아니라 후배, 가족, 주변 사람을 돌보는 태도를 함께 살펴보는 항목입니다.\n\n${output.trim()}`;
      }
      output = keepSingleSummaryBulletSet(output);
      return output.replace(/\n{3,}/g, '\n\n').trim();
    }


    function renderHtmlParagraphs(text, sectionTitle = '') {
      const blocks = normalizeInlineSummaryBullets(text, sectionTitle)
        .split(/\n{2,}/)
        .map((item) => item.trim())
        .filter(Boolean);
      const rendered = [];
      for (let index = 0; index < blocks.length; index += 1) {
        const block = blocks[index];
        const lines = block.split(/\n/).map((item) => item.trim()).filter(Boolean);
        if (!lines.length) continue;
        const bulletLines = lines.filter((line) => /^-\s+/.test(line));
        const nextBlock = blocks[index + 1] || '';
        const nextLines = nextBlock.split(/\n/).map((item) => item.trim()).filter(Boolean);
        const nextBulletLines = nextLines.filter((line) => /^-\s+/.test(line));
        const isStandaloneSummaryTitle = lines.length === 1 && /(핵심 정리|3줄 요약)/.test(lines[0]) && nextBulletLines.length && nextBulletLines.length === nextLines.length;
        if (isStandaloneSummaryTitle) {
          rendered.push(`<p class="report-summary-title">${escapeHtml(lines[0])}</p><ul class="report-list">${nextBulletLines.map((line) => `<li>${escapeHtml(line.replace(/^-\s+/, ''))}</li>`).join('')}</ul>`);
          index += 1;
          continue;
        }
        if (bulletLines.length && bulletLines.length === lines.length) {
          rendered.push(`<ul class="report-list">${bulletLines.map((line) => `<li>${escapeHtml(line.replace(/^-\s+/, ''))}</li>`).join('')}</ul>`);
          continue;
        }
        if (bulletLines.length && !/^-\s+/.test(lines[0])) {
          const introLines = lines.slice(0, lines.length - bulletLines.length);
          const introClass = /(핵심 정리|3줄 요약)/.test(introLines.join(' ')) ? ' class="report-summary-title"' : '';
          rendered.push(`<p${introClass}>${escapeHtml(introLines.join('\n')).replace(/\n/g, '<br>')}</p><ul class="report-list">${bulletLines.map((line) => `<li>${escapeHtml(line.replace(/^-\s+/, ''))}</li>`).join('')}</ul>`);
          continue;
        }
        const paragraphClass = /(핵심 정리|3줄 요약)/.test(lines.join(' ')) ? ' class="report-summary-title"' : '';
        rendered.push(`<p${paragraphClass}>${escapeHtml(lines.join('\n')).replace(/\n/g, '<br>')}</p>`);
      }
      return rendered.join('');
    }

    function renderHtmlReport(data) {
      if (!reportView) return;
      const currentOrderId = data.orderId || activeOrderId || '';
      if (renderedCompletedOrderId && renderedCompletedOrderId === currentOrderId && !reportView.hidden) return;
      const sections = data.reportSections || {};
      const applicantName = data?.applicant?.name || '';
      const cards = REPORT_SECTION_ORDER
        .filter((title) => getReportSectionBody(sections, title))
        .map((title) => {
          const body = getReportSectionBody(sections, title);
          const paragraphs = renderHtmlParagraphs(body, title);
          return `<article class="report-card"><h2>${escapeHtml(getReportSectionTitle(title, body, applicantName))}</h2>${paragraphs}</article>`;
        })
        .join('');
      reportView.hidden = false;
      loadingPanel.hidden = true;
      timelinePanel.hidden = true;
      actions.hidden = true;
      detailBox.hidden = true;
      if (pageTitle) pageTitle.textContent = '프리미엄 사주 리포트';
      document.title = '프리미엄 사주 리포트 | 다온사주';
      if (statusSub) {
        statusSub.textContent = '';
        statusSub.hidden = true;
      }
      const applicantMetaMarkup = buildApplicantMetaMarkup(data);
      const reportNoteMarkup = data.reportNote ? `<div class="report-notice">${escapeHtml(data.reportNote)}</div>` : '';
      reportView.innerHTML = `
        <article class="report-meta-card">
          <h2>프리미엄 사주 리포트</h2>
          ${applicantMetaMarkup}
        </article>
        ${reportNoteMarkup}
        ${cards}
        <div class="report-copy-wrap">
          <button class="report-copy-btn" id="copyReportButton" type="button">전체 내용 복사하기</button>
        </div>
      `;
      const copyButton = document.getElementById('copyReportButton');
      const reportText = buildReportText(data);
      renderedCompletedOrderId = currentOrderId;
      copyButton?.addEventListener('click', async () => {
        try {
          await copyReportText(reportText);
          showCopyToast('리포트 전체 내용이 복사되었습니다. 필요한 곳에 붙여넣어 보관해 주세요.');
        } catch (error) {
          showCopyToast('자동 복사에 실패했습니다. 내용을 직접 선택해 복사해 주세요.', true);
        }
      });
    }

    function renderStatus(data) {
      const rawStatus = data.status || 'created';
      const currentStep = data.currentStep || null;
      const progress = Number.isFinite(Number(data.progress)) ? Number(data.progress) : null;
      if (statusSub) statusSub.hidden = false;
      const currentOrderId = data.orderId || activeOrderId || '';
      const cachedSections = data.reportSections || loadCompletedReport(currentOrderId);
      const hasRenderableSections = Boolean(cachedSections && Object.keys(cachedSections).length);
      const hasFatalFailedSections = Array.isArray(data.failedSections) && data.failedSections.length > 0;
      const normalizedFailedStatus = rawStatus === 'failed' && !hasFatalFailedSections && (hasRenderableSections || Number(progress || 0) >= 90);
      const status = rawStatus === 'ready'
        ? 'completed'
        : normalizedFailedStatus
          ? (hasRenderableSections ? 'completed' : 'generating')
          : rawStatus;
      const renderData = hasRenderableSections ? { ...data, status, reportSections: cachedSections } : { ...data, status };
      const completedButMissingSections = status === 'completed' && renderData.viewMode === 'html' && !hasRenderableSections;
      const updatedAtMs = renderData.updatedAt ? Date.parse(renderData.updatedAt) : 0;
      const isHighProgressDelay = !hasRenderableSections && status !== 'completed' && Number(progress || 0) >= 90 && updatedAtMs && (Date.now() - updatedAtMs >= 60000);
      const showDelayNotice = status === 'failed' || isHighProgressDelay;
      renderReceiptMeta(renderData);
      renderDebugState(renderData);
      const statusMap = {
        created: '주문 접수',
        payment_pending: '결제 대기 중',
        queued: '제작 접수 완료',
        payment_success: '제작 접수 완료',
        generating: '리포트 생성 중',
        ready: '리포트 준비 완료',
        completed: '리포트 준비 완료',
        payment_cancelled: '결제 취소',
        failed: '일시적 지연'
      };
      statusBadge.textContent = showDelayNotice ? '확인 지연' : (statusMap[status] || '상태 확인 중');

      const isCompleted = status === 'completed';
      const isQueued = status === 'queued' || status === 'payment_success';
      const isGenerating = isQueued || status === 'generating';
      statusCard.classList.toggle('is-final', ['completed', 'payment_cancelled', 'failed'].includes(status));
      statusCard.classList.toggle('is-failed', ['payment_cancelled', 'failed'].includes(status));
      if (statusSub) {
        statusSub.textContent = completedButMissingSections
          ? '리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.'
          : isCompleted
            ? (hasRenderableSections
                ? '리포트 생성이 완료되었습니다.'
                : '리포트 표시 중 문제가 발생했습니다. 고객센터로 문의해 주세요.')
            : showDelayNotice
              ? '리포트 정보를 확인하고 있습니다. 잠시 후 다시 확인해 주세요. 문제가 계속되면 고객센터로 문의해 주세요.'
              : isQueued
                ? '리포트 생성이 접수되었습니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요.'
                : status === 'payment_cancelled'
                  ? '결제가 취소되어 리포트 생성이 진행되지 않았습니다.'
                  : (renderData.productType === 'compatibility'
                      ? '리포트 생성 중입니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요. 2인 궁합 리포트는 분석 내용이 많아 몇 분 정도 소요될 수 있습니다.'
                      : '리포트 생성 중입니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요. 생성 완료 후 리포트가 현재 화면에 표시됩니다.');
      }

      loadingText.textContent = completedButMissingSections
        ? '리포트 표시 오류'
        : isCompleted
          ? '리포트 준비 완료'
          : showDelayNotice
            ? '리포트 정보를 확인하고 있습니다'
            : status === 'payment_cancelled'
              ? '결제가 취소되었습니다'
              : isQueued
                ? '제작 접수 완료'
                : isGenerating
                  ? '리포트 생성 중'
                  : '리포트 상태 확인 중';

      if (['queued', 'payment_success', 'generating', 'completed'].includes(status)) {
        paymentStep.textContent = status === 'queued' || status === 'payment_success'
          ? '결제가 정상 확인되어 리포트 제작이 접수되었습니다.'
          : '결제 성공이 확인되었습니다.';
        setStepState(stepPayment, 'done');
      } else if (status === 'payment_cancelled') {
        paymentStep.textContent = '결제가 취소되어 리포트 제작이 진행되지 않았습니다.';
        setStepState(stepPayment, 'pending');
      } else {
        paymentStep.textContent = '결제 승인 여부를 확인하고 있습니다.';
        setStepState(stepPayment, status === 'payment_pending' ? 'active' : 'pending');
      }

      if (showDelayNotice) {
        generationStep.textContent = '리포트 정보를 확인하고 있습니다. 잠시 후 다시 확인해 주세요.';
        downloadStep.textContent = '문제가 계속되면 고객센터로 문의해 주세요.';
        setStepState(stepGenerating, 'active');
        setStepState(stepDownload, 'pending');
      } else if (status === 'queued' || status === 'payment_success' || status === 'generating') {
        generationStep.textContent = '사주 계산과 해석 문장을 정리하고 있습니다. 이 페이지를 닫지 말고 잠시만 기다려 주세요.';
        downloadStep.textContent = '완료 후 모바일 리포트를 현재 화면에서 확인할 수 있습니다.';
        setStepState(stepGenerating, 'active');
        setStepState(stepDownload, 'pending');
      } else if (completedButMissingSections) {
        generationStep.textContent = '리포트 생성은 완료되었지만 화면 표시 중 문제가 발생했습니다.';
        downloadStep.textContent = '리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.';
        setStepState(stepGenerating, 'done');
        setStepState(stepDownload, 'pending');
      } else if (isCompleted) {
        generationStep.textContent = hasRenderableSections ? '리포트 생성이 완료되었습니다.' : '리포트 생성은 완료되었지만 화면 표시를 다시 확인해 주세요.';
        downloadStep.textContent = hasRenderableSections ? '전체 내용 복사하기 버튼으로 내용을 보관할 수 있습니다.' : '리포트 표시를 다시 확인해 주세요.';
        setStepState(stepGenerating, 'done');
        setStepState(stepDownload, 'done');
      } else if (status === 'failed') {
        generationStep.textContent = '리포트 해석 생성 단계에서 일시적인 문제가 발생했습니다. 잠시 후 다시 확인해 주세요.';
        downloadStep.textContent = '리포트 해석 생성 단계에서 일시적인 문제가 발생했습니다. 잠시 후 다시 확인해 주세요.';
        setStepState(stepGenerating, 'active');
        setStepState(stepDownload, 'pending');
      } else if (status === 'payment_cancelled') {
        generationStep.textContent = '리포트 제작이 시작되지 않았습니다.';
        downloadStep.textContent = '결제 완료 후에만 모바일 리포트가 준비됩니다.';
        setStepState(stepGenerating, 'pending');
        setStepState(stepDownload, 'pending');
      } else {
        generationStep.textContent = '리포트 제작을 준비하고 있습니다.';
        downloadStep.textContent = '완료 후 모바일 리포트를 현재 화면에서 확인할 수 있습니다.';
        setStepState(stepGenerating, 'pending');
        setStepState(stepDownload, 'pending');
      }

      const stepProgressText = {
        payment_pending: '결제 승인 여부를 확인하고 있습니다.',
        queued: '리포트 제작이 접수되었습니다.',
        payment_success: '리포트 제작이 접수되었습니다.',
        generation: '리포트 제작을 시작하고 있습니다.',
        mansae: '입력하신 생년월일시를 바탕으로 사주 정보를 계산하고 있습니다.',
        saju: '사주 원국과 기본 해석 데이터를 정리하고 있습니다.',
        period: '운의 흐름 데이터를 정리하고 있습니다.',
        compatibility_api: '관계 참고 데이터를 정리하고 있습니다.',
        kie_ai: '사주 원국과 운의 흐름을 바탕으로 해석 문장을 작성하고 있습니다.',
        core: '핵심 요약과 원국 해석을 작성하고 있습니다.',
        timing: '대운, 세운, 월운 흐름을 작성하고 있습니다.',
        analysis: '재물, 직업, 성향 해석을 작성하고 있습니다.',
        life: '생활 전반 조언을 작성하고 있습니다.',
        concern: '고민에 대한 맞춤 조언을 작성하고 있습니다.',
        compatibility: '관계 분석 문장을 작성하고 있습니다.',
        html_render: '완성된 해석 내용을 모바일 리포트 화면으로 정리하고 있습니다.',
        completed: '리포트가 준비되었습니다.'
      };
      const defaultProgress = status === 'payment_pending'
        ? 5
        : isQueued
          ? 10
          : status === 'generating'
            ? 60
            : isCompleted
              ? 100
              : status === 'failed'
                ? 97
                : status === 'payment_cancelled'
                  ? 0
                  : 0;
      const progressText = completedButMissingSections
        ? '리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.'
        : isCompleted
          ? (hasRenderableSections
              ? '리포트 생성이 완료되었습니다.'
              : '리포트 표시를 다시 확인해 주세요.')
          : showDelayNotice
            ? '리포트 정보를 확인하고 있습니다. 잠시 후 다시 확인해 주세요. 문제가 계속되면 고객센터로 문의해 주세요.'
            : status === 'payment_cancelled'
              ? '결제가 취소되어 진행이 중단되었습니다.'
              : (stepProgressText[currentStep || status] || '리포트 제작 상태를 확인하고 있습니다.');
      applyProgress(progress ?? defaultProgress, progressText);

      const updatedText = renderData.updatedAt ? `\n\n최근 갱신: ${new Date(renderData.updatedAt).toLocaleString('ko-KR')}` : '';
      detailBox.hidden = false;
      detailBox.textContent = completedButMissingSections
        ? `리포트 표시 중 문제가 발생했습니다. 페이지를 새로고침하지 말고 고객센터로 문의해 주세요.${updatedText}`
        : `${progressText || '리포트 상태를 계속 확인하고 있습니다.'}${updatedText}`;

      if (isCompleted && renderData.viewMode === 'html' && hasRenderableSections) {
        renderHtmlReport(renderData);
      }
    }

    async function poll() {
      if (pollingStopped || requestInFlight) return;
      if (!activeOrderId) {
        statusBadge.textContent = '리포트 연결 필요';
        receiptMetaBox.hidden = true;
        loadingPanel.hidden = true;
        timelinePanel.hidden = true;
        refreshButton.hidden = true;
        detailBox.textContent = '이 화면은 결제 완료 후 자동으로 연결되는 전용 리포트 페이지입니다.';
        applyProgress(0, '정상적인 주문 연결이 필요합니다.');
        return;
      }
      requestInFlight = true;
      try {
        const res = await fetch(`/api/orders/${encodeURIComponent(activeOrderId)}/status?t=${Date.now()}`, { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
        const data = await res.json();
        const hasFatalFailedSections = Array.isArray(data.failedSections) && data.failedSections.length > 0;
        if (data.status === 'completed' && data.viewMode === 'html' && data.reportSections && Object.keys(data.reportSections).length) {
          const persistedSections = saveCompletedReport(activeOrderId, data.reportSections) || data.reportSections;
          data.reportSections = persistedSections;
          stopPolling();
        } else if (['ready', 'completed', 'payment_cancelled'].includes(data.status) || (data.status === 'failed' && hasFatalFailedSections)) {
          stopPolling();
        }
        renderStatus(data);
        if (!pollingStopped && !['ready', 'completed', 'payment_cancelled'].includes(data.status) && !(data.status === 'failed' && hasFatalFailedSections)) {
          schedulePoll(4000);
        }
      } catch (error) {
        if (!pollingStopped) {
          detailBox.hidden = false;
          detailBox.textContent = '리포트 정보를 확인하고 있습니다. 잠시 후 다시 확인해 주세요. 문제가 계속되면 고객센터로 문의해 주세요.';
          applyProgress(12, '상태를 다시 확인하고 있습니다.');
          schedulePoll(5000);
        }
      } finally {
        requestInFlight = false;
      }
    }

    refreshButton?.addEventListener('click', () => {
      pollingStopped = false;
      requestInFlight = false;
      completedReportState = null;
      renderedCompletedOrderId = null;
      if (pollTimer) {
        window.clearTimeout(pollTimer);
        pollTimer = null;
      }
      window.location.reload();
    });
    poll();
  </script>
